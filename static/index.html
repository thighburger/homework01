<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>매우 좋은 Spam Checker</title>
</head>

<body>
  <h1>AI Spam Checker</h1>
  <textarea id="text" rows="5" cols="60" placeholder="aha Win a FREE prize now"></textarea><br><br>
  <textarea id="text" rows="5" cols="60" placeholder="asdWin a FREE prize now"></textarea><br><br>
  <button onclick="classify()">분류</button>
  <h3 id="result"></h3>
  <script>
    function classify() {
    const text = document.getElementById("text").value;
    //ISSUE2: empty input 처리 
    const result= document.getElementById("result");
    if(!text){
      result.innerText="메시지를 입력해주세요.";
      return;
    }
      fetch("/classify", {
        method: "POST",
        body: JSON.stringify({ text })
      })
        .then(res => res.json())
        .then(data => {
          document.getElementById("result").innerText =
            "결과: " + data.label + " (score=" + data.score + ")";
        })
        .catch(() => {
          document.getElementById("result").innerText =
            "에러 발생";
        });
    }
  </script>
</body>

</html>
